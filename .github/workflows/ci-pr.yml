name: Pull Request CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-format:
    name: Lint & Format
    uses: ./.github/workflows/ci-lint.yml

  build:
    name: Build Verification
    needs: lint-and-format
    uses: ./.github/workflows/ci-build.yml

  tests:
    name: Test Suite
    needs: build
    uses: ./.github/workflows/ci-test-all.yml
